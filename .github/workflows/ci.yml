name: CI Pipeline !

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test: !
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install !
      - run: npm test !

  security: !
    runs-on: ubuntu-latest !
    steps: !
      - uses: actions/checkout@v3 !
      - name: Run GitLeaks !
        uses: gitleaks/gitleaks-action@v2 !